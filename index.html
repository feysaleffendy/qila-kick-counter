<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qila's Kick Counter</title>

<!-- PDF LIBRARY -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
        background: linear-gradient(to bottom, #ffd6e0, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .app {
        width: 90%;
        max-width: 420px;
        text-align: center;
    }

    h1 {
        font-size: 28px;
        margin-bottom: 5px;
    }

    .subtitle {
        color: #777;
        margin-bottom: 10px;
    }

    .heart {
        font-size: 40px;
        display: inline-block;
        animation: pulse 1.5s infinite;
        margin-bottom: 10px;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
    }

    .card {
        background: rgba(255,255,255,0.7);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 20px;
        margin-bottom: 15px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .timer {
        font-size: 32px;
        font-weight: bold;
    }

    .count {
        font-size: 60px;
        font-weight: bold;
        color: #ff4d6d;
        display: inline-block;
    }

    .bounce {
        animation: bounce 0.3s ease;
    }

    @keyframes bounce {
        0% { transform: scale(1); }
        50% { transform: scale(1.4); }
        100% { transform: scale(1); }
    }

    button {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 15px;
        font-size: 18px;
        margin-top: 10px;
    }

    .kick-btn {
        background: #ff4d6d;
        color: white;
    }

    .stop-btn {
        background: #333;
        color: white;
    }

    .reset-btn {
        margin-top: 10px;
        background: #ff3b30;
        color: white;
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        font-size: 16px;
    }

    .pdf-btn {
        margin-top: 10px;
        background: #6c5ce7;
        color: white;
    }

    .history {
        text-align: left;
        margin-top: 10px;
    }

    .session {
        padding: 10px;
        border-bottom: 1px solid #eee;
    }

    .small {
        color: #888;
        font-size: 12px;
    }

    #message {
        margin-top: 10px;
        font-size: 14px;
        color: #888;
    }
</style>
</head>

<body>

<div class="app">

    <div class="heart">❤️</div>

    <h1>Qila's Kick Counter</h1>
    <div class="subtitle">For our little one</div>

    <!-- TIMER -->
    <div class="card">
        <div class="timer" id="timer">00:00</div>
        <div class="small">Session Time</div>
    </div>

    <!-- COUNTER -->
    <div class="card">
        <div id="message">Hi little one 👶💗</div>
        <div class="count" id="count">0</div>
        <div class="small">Kicks</div>

        <button class="kick-btn" onclick="addKick()" id="kickBtn">
            Tap when baby kicks
        </button>
    </div>

    <!-- STOP -->
    <button class="stop-btn" onclick="stopSession()" id="stopBtn" disabled>
        Stop & Save
    </button>

    <!-- HISTORY -->
    <div class="card history">
        <h3>History</h3>
        <div id="history"></div>

        <button class="reset-btn" onclick="resetHistory()">
            Clear History
        </button>

        <button class="pdf-btn" onclick="exportPDF()">
            Export Hospital Report PDF
        </button>
    </div>
</div>

<script>
let kicks = 0;
let startTime = null;
let timerInterval = null;
let sessionActive = false;

let sessions = JSON.parse(localStorage.getItem("sessions")) || [];

const messages = [
    "Hi little one 👶💗",
    "You’re doing amazing sayang 🌸",
    "Baby says hello ❤️",
    "Every kick is a smile ✨",
    "Growing strong together 💕",
    "Little kicks, big love 💖",
    "You’ve got this sayang 🤍",
    "Tiny miracle in motion 🌷"
];

/* START */
function startSessionAuto() {
    kicks = 0;
    startTime = Date.now();
    sessionActive = true;

    document.getElementById("stopBtn").disabled = false;

    timerInterval = setInterval(updateTimer, 1000);
}

/* MESSAGE */
function updateMessage() {
    let msg = document.getElementById("message");
    let index = Math.floor(kicks / 3) % messages.length;
    msg.innerText = messages[index];
}

/* KICK */
function addKick() {
    if (!sessionActive) startSessionAuto();

    kicks++;
    let el = document.getElementById("count");
    el.innerText = kicks;

    el.classList.remove("bounce");
    void el.offsetWidth;
    el.classList.add("bounce");

    updateMessage();

    if (navigator.vibrate) navigator.vibrate(50);
}

/* TIMER */
function updateTimer() {
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let m = String(Math.floor(elapsed / 60)).padStart(2,'0');
    let s = String(elapsed % 60).padStart(2,'0');
    document.getElementById("timer").innerText = `${m}:${s}`;
}

/* STOP */
function stopSession() {
    if (!sessionActive) return;

    clearInterval(timerInterval);

    let session = {
        date: new Date().toLocaleString(),
        kicks: kicks,
        duration: Math.floor((Date.now() - startTime) / 1000)
    };

    sessions.unshift(session);
    localStorage.setItem("sessions", JSON.stringify(sessions));

    renderHistory();

    sessionActive = false;
    kicks = 0;
    startTime = null;

    document.getElementById("count").innerText = "0";
    document.getElementById("timer").innerText = "00:00";
    document.getElementById("stopBtn").disabled = true;
}

/* HISTORY */
function renderHistory() {
    let div = document.getElementById("history");
    div.innerHTML = "";

    sessions.forEach(s => {
        let item = document.createElement("div");
        item.className = "session";
        item.innerHTML = `
            <b>${s.kicks} kicks</b><br>
            <span class="small">${formatTime(s.duration)} • ${s.date}</span>
        `;
        div.appendChild(item);
    });
}

/* FORMAT */
function formatTime(sec) {
    let m = Math.floor(sec / 60);
    let s = sec % 60;
    return `${m}m ${s}s`;
}

/* RESET */
function resetHistory() {
    if (confirm("Clear all history?")) {
        sessions = [];
        localStorage.removeItem("sessions");
        renderHistory();
    }
}

/* PDF EXPORT (HOSPITAL STYLE) */
function exportPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.setFont("helvetica","bold");
    doc.setFontSize(16);
    doc.text("MATERNAL & FETAL WELLNESS REPORT", 14, 15);

    doc.setFontSize(10);
    doc.setFont("helvetica","normal");
    doc.text("Antenatal Kick Count Monitoring System", 14, 22);

    let refId = "KC-" + Math.floor(Math.random()*900000+100000);
    doc.text("Report ID: " + refId, 145, 15);

    doc.line(14, 26, 196, 26);

    let total = sessions.reduce((a,b)=>a+b.kicks,0);

    doc.text("Total Sessions: " + sessions.length, 14, 40);
    doc.text("Total Kicks: " + total, 14, 47);

    let y = 60;

    doc.text("Date", 14, y);
    doc.text("Kicks", 90, y);
    doc.text("Duration", 140, y);

    y += 10;

    sessions.forEach(s=>{
        if(y>270){doc.addPage(); y=20;}
        doc.text(String(s.date),14,y);
        doc.text(String(s.kicks),90,y);
        doc.text(formatTime(s.duration),140,y);
        y+=10;
    });

    doc.text("End of Report", 14, 280);
    doc.save("qila-report-" + refId + ".pdf");
}

/* INIT */
renderHistory();
</script>

</body>
</html>
